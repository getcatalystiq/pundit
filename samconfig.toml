# SAM CLI Configuration for Pundit MCP Server
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default]
[default.global.parameters]
stack_name = "pundit-dev"

[default.build.parameters]
cached = true
parallel = true
use_container = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
s3_prefix = "pundit-dev"
region = "us-east-1"
parameter_overrides = "Environment=\"dev\""

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

# ============================================================================
# Staging environment
# ============================================================================
[staging]
[staging.deploy.parameters]
stack_name = "pundit-staging"
s3_prefix = "pundit-staging"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
parameter_overrides = "Environment=\"staging\" MavenVpcId=\"/maven/staging/vpc-id\" MavenPrivateSubnet1=\"/maven/staging/private-subnet-1\" MavenPrivateSubnet2=\"/maven/staging/private-subnet-2\" MavenDBSubnetGroup=\"/maven/staging/db-subnet-group\" MavenLambdaSecurityGroup=\"/maven/staging/lambda-sg\" MavenBastionSecurityGroup=\"/maven/staging/bastion-sg\""

# ============================================================================
# Production environment
# ============================================================================
[prod]
[prod.deploy.parameters]
stack_name = "pundit-prod"
s3_prefix = "pundit-prod"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = false
resolve_s3 = true
resolve_image_repos = true
parameter_overrides = "Environment=\"prod\" AuroraMinCapacity=\"0.5\" AuroraMaxCapacity=\"16\" MavenVpcId=\"/maven/prod/vpc-id\" MavenPrivateSubnet1=\"/maven/prod/private-subnet-1\" MavenPrivateSubnet2=\"/maven/prod/private-subnet-2\" MavenDBSubnetGroup=\"/maven/prod/db-subnet-group\" MavenLambdaSecurityGroup=\"/maven/prod/lambda-sg\" MavenBastionSecurityGroup=\"/maven/prod/bastion-sg\""
